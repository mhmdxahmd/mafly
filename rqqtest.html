<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>403 诊断工具</title>
    <style>
        body {font-family: system-ui, sans-serif; padding: 20px; background: #f5f5f7;}
        .container {max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);}
        textarea {width: 100%; height: 280px; font-family: monospace; padding: 12px;}
        button {padding: 14px 26px; margin: 10px 8px 10px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #0071e3; color: white;}
        .success {background: #28a745;}
        .status {padding: 16px; border-radius: 8px; margin: 15px 0; white-space: pre-wrap; font-family: monospace; background: #f8f9fa; border: 1px solid #ddd;}
    </style>
</head>
<body>
<div class="container">
    <h2>403 Headers 诊断工具</h2>
    <textarea id="headers" placeholder="粘贴你的完整 Headers JSON"></textarea>
    <button onclick="testCatalog()">测试 /nodes/catalog</button>
    <button onclick="testSession()">测试单个 session</button>

    <div id="status" class="status">结果将显示在这里...</div>
</div>

<script>
async function callApi(path, method = 'GET', body = null) {
    const url = 'https://apic.ic1008.com/api/v1' + path;
    let headers = {"Content-Type": "application/json", "Accept": "application/json"};
    
    const hText = document.getElementById('headers').value.trim();
    if (hText) {
        try {
            headers = {...headers, ...JSON.parse(hText)};
        } catch (e) {
            return {status: 0, data: 'Headers JSON 格式错误'};
        }
    }

    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);

    try {
        const res = await fetch(url, opts);
        let data;
        try { data = await res.json(); } catch { data = await res.text(); }
        return {status: res.status, data, headersUsed: Object.keys(headers)};
    } catch (e) {
        return {status: 0, data: e.message};
    }
}

async function testCatalog() {
    const status = document.getElementById('status');
    status.innerText = '正在测试 /nodes/catalog...\n';
    const r = await callApi('/nodes/catalog');
    status.innerText = `状态码: ${r.status}\n\n返回: ${JSON.stringify(r.data, null, 2)}\n\n使用的 Headers 键: ${r.headersUsed ? r.headersUsed.join(', ') : '无'}`;
}

async function testSession() {
    const status = document.getElementById('status');
    status.innerText = '测试 /nodes/session (使用第一个节点ID)...\n';
    const cat = await callApi('/nodes/catalog');
    if (cat.status !== 200 || !cat.data.nodes) {
        status.innerText += 'Catalog 先失败，无法继续';
        return;
    }
    const nodeId = cat.data.nodes[0].id;
    const r = await callApi('/nodes/session', 'POST', {node_id: nodeId});
    status.innerText = `Session 测试 - 状态码: ${r.status}\n\n${JSON.stringify(r.data, null, 2)}`;
}
</script>
</body>
</html>
