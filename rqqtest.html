<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>热气球节点提取 v2.8 - Permit + Session</title>
    <style>
        body{font-family:system-ui,sans-serif;padding:20px;background:#f5f5f7;}
        .container{max-width:980px;margin:auto;background:white;padding:25px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
        textarea{width:100%;height:220px;font-family:monospace;padding:12px;}
        button{padding:14px 26px;margin:8px 8px 8px 0;border:none;border-radius:6px;font-weight:bold;cursor:pointer;background:#0071e3;color:white;}
        .success{background:#28a745;}
        .status{padding:16px;border-radius:8px;margin:15px 0;white-space:pre-wrap;background:#f8f9fa;border:1px solid #ddd;}
        .output-box{background:#f8f9fa;border:1px solid #ddd;padding:16px;border-radius:8px;max-height:600px;overflow:auto;white-space:pre-wrap;font-family:monospace;}
    </style>
</head>
<body>
<div class="container">
    <h2>热气球节点提取 v2.8（已通 Catalog）</h2>

    <div><label>代理</label>
        <select id="proxy">
            <option value="https://seep.eu.org/">seep.eu.org</option>
            <option value="https://restless-rice-b2a2.ganpig.workers.dev/">ganpig</option>
        </select>
    </div>

    <div><label>Headers JSON</label><textarea id="headers"></textarea></div>

    <button onclick="runPermit()">1. 执行 Permit 流程</button>
    <button onclick="extractNodes()">2. 提取节点</button>

    <div id="status" class="status">Catalog 已通，下一步执行 Permit</div>
    <div id="output" class="output-box"></div>
    <button id="copyBtn" style="display:none;" class="success" onclick="copyResult()">复制节点</button>
</div>

<script>
async function call(path, method='GET', body=null) {
    const proxy = document.getElementById('proxy').value;
    const base = 'https://apic.ic1008.com/api/v1';
    const url = proxy + base + path;

    let headers = {"Content-Type": "application/json"};
    const h = document.getElementById('headers').value.trim();
    if (h) headers = {...headers, ...JSON.parse(h)};

    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(url, opts);
    let data;
    try { data = await res.json(); } catch { data = await res.text(); }
    return {status: res.status, data};
}

async function runPermit() {
    const status = document.getElementById('status');
    status.innerText = '执行 Permit 流程...\n';

    await call('/connect/permit/challenge', 'GET');
    await new Promise(r => setTimeout(r, 1000));

    const watch = await call('/connect/permit/watch', 'POST', {});
    status.innerText += `Permit 返回: ${JSON.stringify(watch.data)}\n`;

    if (watch.status === 200) status.innerText += '✅ Permit 可能已通过，尝试提取节点';
}

async function extractNodes() {
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    output.innerText = '';
    document.getElementById('copyBtn').style.display = 'none';

    status.innerText = '获取目录...\n';
    const cat = await call('/nodes/catalog');
    const nodes = cat.data.nodes || [];

    let uris = [];
    for (let node of nodes) {
        const nodeId = node.id || node.node_id;
        const sess = await call('/nodes/session', 'POST', {node_id: nodeId});
        if (sess.status === 200 && sess.data && sess.data.uri) {
            uris.push(sess.data.uri);
            output.innerText = uris.join('\n');
        }
        await new Promise(r => setTimeout(r, 550));
    }

    if (uris.length > 0) {
        status.innerText = `✅ 成功 ${uris.length} 个节点！`;
        document.getElementById('copyBtn').style.display = 'block';
    } else {
        status.innerText = `仍 403 - 请先执行 Permit`;
    }
}

function copyResult() {
    navigator.clipboard.writeText(document.getElementById('output').innerText);
    alert('已复制');
}
</script>
</body>
</html>
