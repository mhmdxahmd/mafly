<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>热气球节点提取 - 修复版</title>
    <style>
        body{font-family:system-ui,sans-serif;padding:20px;background:#f5f5f7;}
        .container{max-width:960px;margin:auto;background:white;padding:25px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
        textarea{width:100%;height:260px;font-family:monospace;padding:12px;}
        button{padding:14px 28px;margin:10px 8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;background:#0071e3;color:white;}
        .success{background:#28a745;}
        .error{background:#d32f2f;color:white;}
        .status{padding:16px;border-radius:8px;margin:15px 0;white-space:pre-wrap;background:#f8f9fa;border:1px solid #ddd;}
    </style>
</head>
<body>
<div class="container">
    <h2>热气球节点提取工具</h2>
    <p style="color:red;"><strong>重要</strong>：请通过 http 服务器打开此文件（不要直接双击）</p>

    <div><label>Headers JSON</label><textarea id="headers"></textarea></div>

    <button onclick="testCatalog()">测试 Catalog</button>
    <button onclick="extract()">开始提取</button>

    <div id="status" class="status">把 Headers 粘贴后点击测试</div>
    <div id="output" style="margin-top:15px;max-height:500px;overflow:auto;white-space:pre-wrap;font-family:monospace;"></div>
</div>

<script>
async function call(path, method = 'GET', body = null) {
    const url = 'https://apic.ic1008.com/api/v1' + path;
    let headers = {"Content-Type": "application/json"};
    
    const h = document.getElementById('headers').value.trim();
    if (h) headers = {...headers, ...JSON.parse(h)};

    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(url, opts);
    let data;
    try { data = await res.json(); } catch { data = await res.text(); }
    return {status: res.status, data};
}

async function testCatalog() {
    const status = document.getElementById('status');
    status.innerText = '正在请求...\n';
    const r = await call('/nodes/catalog');
    status.innerText = `状态码: ${r.status}\n\n${JSON.stringify(r.data, null, 2)}`;
}

async function extract() {
    // 简化版提取
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    output.innerText = '';
    status.innerText = '提取中...\n';

    const cat = await call('/nodes/catalog');
    if (cat.status !== 200) {
        status.innerText = `Catalog 失败: ${cat.status}`;
        return;
    }

    // ... 后续提取逻辑
    status.innerText = `成功获取目录 (${cat.data.nodes.length} 个节点)，但 session 仍需 Headers 正确`;
}
</script>
</body>
</html>
