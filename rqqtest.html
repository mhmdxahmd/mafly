<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>热气球节点提取 v2.7 - CORS 修复</title>
    <style>
        body{font-family:system-ui,sans-serif;padding:20px;background:#f5f5f7;}
        .container{max-width:980px;margin:auto;background:white;padding:25px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
        textarea{width:100%;height:240px;font-family:monospace;padding:12px;}
        button{padding:14px 26px;margin:8px 8px 8px 0;border:none;border-radius:6px;font-weight:bold;cursor:pointer;background:#0071e3;color:white;}
        .success{background:#28a745;}
        .status{padding:16px;border-radius:8px;margin:15px 0;white-space:pre-wrap;background:#f8f9fa;border:1px solid #ddd;}
        .output-box{background:#f8f9fa;border:1px solid #ddd;padding:16px;border-radius:8px;max-height:600px;overflow:auto;white-space:pre-wrap;font-family:monospace;}
    </style>
</head>
<body>
<div class="container">
    <h2>热气球节点提取 v2.7（CORS 修复）</h2>

    <div>
        <label>选择代理（必须选一个）</label>
        <select id="proxy">
            <option value="https://seep.eu.org/">seep.eu.org（推荐）</option>
            <option value="https://restless-rice-b2a2.ganpig.workers.dev/">ganpig workers</option>
            <option value="https://proxy.api.030101.xyz/">030101 proxy</option>
        </select>
    </div>

    <div>
        <label>Headers JSON</label>
        <textarea id="headers"></textarea>
    </div>

    <button onclick="testCatalog()">测试 Catalog</button>
    <button onclick="extractNodes()">开始提取节点</button>

    <div id="status" class="status">选择代理 + 粘贴 Headers 后测试</div>
    <div id="output" class="output-box"></div>
    <button id="copyBtn" style="display:none;" class="success" onclick="copyResult()">复制全部节点</button>
</div>

<script>
async function call(path, method = 'GET', body = null) {
    const proxy = document.getElementById('proxy').value;
    const base = 'https://apic.ic1008.com/api/v1';
    const url = proxy + base + path;

    let headers = {"Content-Type": "application/json"};
    const hText = document.getElementById('headers').value.trim();
    if (hText) headers = {...headers, ...JSON.parse(hText)};

    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(url, opts);
    let data;
    try { data = await res.json(); } catch { data = await res.text(); }
    return {status: res.status, data};
}

async function testCatalog() {
    const status = document.getElementById('status');
    status.className = 'status';
    status.innerText = '正在测试...\n';
    const r = await call('/nodes/catalog');
    status.innerText = `状态码: ${r.status}\n\n${JSON.stringify(r.data, null, 2).slice(0, 800)}`;
}

async function extractNodes() {
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    output.innerText = '';
    document.getElementById('copyBtn').style.display = 'none';

    status.innerText = '获取目录...\n';
    const cat = await call('/nodes/catalog');
    if (cat.status !== 200) {
        status.innerText = `失败 ${cat.status} - 请检查代理和 Headers`;
        return;
    }

    const nodes = cat.data.nodes || [];
    let uris = [];

    for (let node of nodes) {
        const nodeId = node.id || node.node_id;
        const sess = await call('/nodes/session', 'POST', {node_id: nodeId});
        if (sess.status === 200 && sess.data && sess.data.uri) {
            uris.push(sess.data.uri);
            output.innerText = uris.join('\n');
        }
        await new Promise(r => setTimeout(r, 600));
    }

    if (uris.length > 0) {
        status.innerText = `✅ 成功 ${uris.length} 个节点！`;
        document.getElementById('copyBtn').style.display = 'block';
    } else {
        status.innerText = `未能拿到 URI，可能是 Headers 仍不完整`;
    }
}

function copyResult() {
    navigator.clipboard.writeText(document.getElementById('output').innerText);
    alert('已复制');
}
</script>
</body>
</html>
