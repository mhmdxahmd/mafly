
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
    <title>MAFLYA-TV 源自-裤佬TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', system-ui, sans-serif;
        }

        :root {
            --bg: #0a0a0e;
            --surface: rgba(255, 255, 255, 0.06);
            --surface-hover: rgba(255, 255, 255, 0.10);
            --surface-active: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f5f5f7;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: rgba(0, 0, 0, 0.04);
            --surface-hover: rgba(0, 0, 0, 0.07);
            --surface-active: rgba(0, 0, 0, 0.11);
            --border: rgba(0, 0, 0, 0.07);
            --text: #1c1c1e;
            --text-secondary: #6c6c70;
            --text-tertiary: #8e8e93;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
        }

        html {
            -webkit-overflow-scrolling: touch;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 16px calc(var(--safe-bottom) + 20px);
            position: relative;
            z-index: 2;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding: 4px 0 12px;
        }

        .pill {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border);
            border-radius: var(--radius-full);
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pill:hover { background: var(--surface-hover); }
        .pill:active { transform: scale(0.94); }

        .hero {
            text-align: center;
            padding: 8px 0 20px;
        }

        .hero-title {
            font-size: clamp(52px, 14vw, 86px);
            font-weight: 800;
            letter-spacing: -0.03em;
            display: inline-block;
            margin-bottom: 12px;
            background: linear-gradient(
                135deg,
                #ffffff 0%,
                #a8a8b8 20%,
                #ffffff 40%,
                #c8c8d8 55%,
                #ffffff 70%,
                #a8a8b8 85%,
                #ffffff 100%
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: beamSweep 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.06);
        }

        [data-theme="light"] .hero-title {
            background: linear-gradient(
                135deg,
                #1c1c1e 0%,
                #4a4a50 20%,
                #1c1c1e 40%,
                #5a5a62 55%,
                #1c1c1e 70%,
                #4a4a50 85%,
                #1c1c1e 100%
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: beamSweep 4s ease-in-out infinite;
        }

        @keyframes beamSweep {
            0% {
                background-position: 0% 50%;
                filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.04));
            }
            25% {
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.12));
            }
            50% {
                background-position: 100% 50%;
                filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.04));
            }
            75% {
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.12));
            }
            100% {
                background-position: 0% 50%;
                filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.04));
            }
        }

        .hero-avatar {
            display: flex;
            justify-content: center;
            margin: 10px 0 14px;
        }

        .hero-avatar img {
            width: clamp(100px, 15vw, 160px);
            height: clamp(100px, 15vw, 160px);
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.03);
            object-fit: cover;
            transition: transform 0.3s;
        }
        .hero-avatar img:hover { transform: scale(1.04); }

        [data-theme="light"] .hero-avatar img {
            border: 2.5px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
        }

        .hero-sub {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: clamp(13px, 1.4vw, 15px);
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.02em;
            flex-wrap: wrap;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 18px;
            margin-top: 10px;
            align-items: start;
        }

        .player-card {
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius);
            border: 0.5px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 0.5px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .player-info .logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: var(--surface);
            border: 0.5px solid var(--border);
            object-fit: cover;
            flex-shrink: 0;
        }

        .player-info .name {
            font-weight: 600;
            font-size: 17px;
            letter-spacing: -0.01em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(16, 185, 129, 0.12);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            color: #10b981;
            letter-spacing: 0.02em;
        }

        .live-badge .dot {
            width: 5px;
            height: 5px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .player-badge {
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--surface);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            border: 0.5px solid var(--border);
            white-space: nowrap;
        }

        .player-container {
            margin: 14px 16px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
            position: relative;
            border: 0.5px solid var(--border);
            min-height: 200px;
        }

        .player-container iframe,
        .player-container video {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            display: block;
            background: #000;
        }

        .player-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-secondary);
            gap: 8px;
            font-weight: 400;
            text-align: center;
            padding: 20px;
        }
        .player-placeholder .icon { font-size: 36px; opacity: 0.4; }
        .player-placeholder .hint { font-size: 13px; color: var(--text-tertiary); }

        .player-actions {
            display: flex;
            gap: 12px;
            padding: 0 16px 16px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: -0.01em;
            min-height: 48px;
        }
        .btn:active { transform: scale(0.94); }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 0.5px solid var(--border);
        }
        .btn-secondary:hover { background: var(--surface-hover); }

        .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .channels-panel {
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius);
            border: 0.5px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            max-height: clamp(55vh, 68vh, 76vh);
            overflow-y: auto;
            transition: all 0.3s;
        }

        .channels-panel::-webkit-scrollbar { width: 3px; }
        .channels-panel::-webkit-scrollbar-track { background: transparent; }
        .channels-panel::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 10px; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 14px;
            border-bottom: 0.5px solid var(--border);
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.01em;
            position: sticky;
            top: 0;
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 5;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .panel-header .count {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-tertiary);
            background: var(--surface);
            padding: 4px 14px;
            border-radius: var(--radius-full);
            border: 0.5px solid var(--border);
        }

        .channels-list {
            padding: 8px 0 16px;
        }

        .category-group {
            margin-bottom: 16px;
        }

        .category-header {
            padding: 20px 22px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.01em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            touch-action: manipulation;
            min-height: 62px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 0.5px solid var(--border);
            transition: background 0.15s;
        }
        .category-header:hover { background: var(--surface-hover); }
        .category-header:active { background: var(--surface-active); }
        .category-header .arrow { font-size: 14px; opacity: 0.35; transition: transform 0.25s; }
        .category-header.collapsed .arrow { transform: rotate(-90deg); }

        .category-channels {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .category-channels.collapsed { max-height: 0 !important; }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 18px 22px;
            margin: 6px 14px;
            border-radius: var(--radius-sm);
            gap: 16px;
            cursor: pointer;
            transition: all 0.15s;
            border: 0.5px solid transparent;
            touch-action: manipulation;
            min-height: 86px;
            background: rgba(255, 255, 255, 0.02);
        }
        .channel-item:hover { background: var(--surface-hover); border-color: var(--border); }
        .channel-item:active { transform: scale(0.97); }
        .channel-item.active { background: rgba(255, 255, 255, 0.06); border-left: 3px solid var(--text); }
        .channel-item.active .item-title { color: var(--text); }

        .item-logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--surface);
            border: 0.5px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 14px;
            font-weight: 500;
        }

        .item-info { flex: 1; min-width: 0; }
        .item-title {
            font-weight: 500;
            font-size: 18px;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }
        .item-score {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.2);
            padding: 0 10px;
            border-radius: var(--radius-full);
            font-family: 'SF Mono', monospace;
            white-space: nowrap;
        }
        .item-status {
            font-size: 13px;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .item-status .dot { width: 5px; height: 5px; background: #10b981; border-radius: 50%; }

        .item-play {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--text);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            touch-action: manipulation;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .item-play:hover { transform: scale(1.06); }
        .item-play:active { transform: scale(0.88); }

        .toast {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 20px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 35, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 10px 22px;
            border-radius: var(--radius-full);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 0.5px solid rgba(255,255,255,0.06);
            max-width: 88vw;
            text-align: center;
            animation: toastUp 0.35s ease-out;
            letter-spacing: -0.01em;
        }

        @keyframes toastUp {
            from { opacity: 0; transform: translateX(-50%) translateY(12px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 820px) {
            .main-grid { grid-template-columns: 1fr; gap: 16px; }
            .app { padding: 8px 12px calc(var(--safe-bottom) + 16px); }
            .channels-panel { max-height: 50vh; }
            .player-container { min-height: 200px; margin: 12px 14px; }

            .channel-item { min-height: 80px; padding: 16px 18px; margin: 6px 12px; gap: 14px; }
            .item-title { font-size: 17px; }
            .item-play { width: 42px; height: 42px; font-size: 15px; }
            .category-header { padding: 18px 20px; font-size: 17px; min-height: 58px; }
            .panel-header { padding: 14px 18px 12px; font-size: 17px; }
            .btn { min-height: 44px; font-size: 14px; padding: 10px 14px; }
            .hero-title { font-size: 44px; }
            .hero-avatar img { width: 84px; height: 84px; }
        }

        @media (max-width: 480px) {
            .app { padding: 6px 8px calc(var(--safe-bottom) + 12px); }
            .hero-title { font-size: 36px; }
            .hero-avatar img { width: 72px; height: 72px; }
            .hero-sub { gap: 12px; font-size: 12px; }
            .top-bar { gap: 6px; padding-bottom: 6px; }
            .pill { font-size: 11px; padding: 5px 12px; }
            .player-header { padding: 10px 12px; }
            .player-info .name { font-size: 14px; }
            .player-info .logo { width: 34px; height: 34px; }
            .player-container { min-height: 170px; margin: 8px 10px; }
            .player-actions { padding: 0 10px 12px; gap: 8px; }
            .btn { font-size: 13px; padding: 8px 12px; min-height: 40px; }

            .channel-item { min-height: 76px; padding: 14px 16px; margin: 5px 10px; gap: 12px; }
            .item-title { font-size: 16px; }
            .item-play { width: 38px; height: 38px; font-size: 14px; }
            .item-status { font-size: 12px; }
            .item-score { font-size: 12px; }
            .category-header { padding: 16px 18px; font-size: 16px; min-height: 54px; }
            .panel-header { padding: 12px 16px 10px; font-size: 15px; }
            .toast { font-size: 12px; padding: 7px 16px; bottom: calc(var(--safe-bottom) + 12px); }
        }

        @media (max-width: 380px) {
            .hero-title { font-size: 30px; }
            .hero-avatar img { width: 60px; height: 60px; }
            .player-container { min-height: 140px; }
            .channel-item { min-height: 70px; padding: 12px 14px; margin: 4px 8px; }
            .item-title { font-size: 15px; }
            .item-play { width: 34px; height: 34px; font-size: 13px; }
            .category-header { padding: 14px 16px; font-size: 15px; min-height: 50px; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .hero { padding: 4px 0 8px; }
            .hero-title { font-size: 28px; }
            .hero-avatar img { width: 50px; height: 50px; }
            .player-container { min-height: 120px; }
            .channels-panel { max-height: 58vh; }
            .channel-item { min-height: 60px; padding: 10px 14px; margin: 4px 10px; }
            .item-title { font-size: 15px; }
            .item-play { width: 34px; height: 34px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="top-bar">
        <div class="pill" id="themeToggleBtn">
            <span id="themeIcon">🌙</span>
            <span id="themeText">深色</span>
        </div>
    </div>

    <div class="hero">
        <h1 class="hero-title">Mafly-TV</h1>
        <div class="hero-avatar">
            <img src="https://mpimg.cn/down.php/a67bdffe28a513f430c7f80e066b959f.gif" alt="MAFLYA-TV">
        </div>
        <div class="hero-sub">
            <span>永久免费</span>
            <span>实时抓取</span>
            <span>源自-裤佬TV</span>
        </div>
    </div>

    <div class="main-grid">
        <div class="player-card">
            <div class="player-header">
                <div class="player-info">
                    <img id="currentLogo" class="logo" src="" alt="logo"
                         onerror="this.style.display='none'">
                    <span class="name" id="currentChannelName">选择频道</span>
                    <span class="live-badge"><span class="dot"></span> LIVE</span>
                </div>
                <span class="player-badge" id="playerBadge">📡 内嵌</span>
            </div>

            <div class="player-container" id="playerContainer">
                <div class="player-placeholder">
                    <span class="icon">🎥</span>
                    <span>点击「立即观看」或频道 ▶</span>
                    <span class="hint">内嵌直播直接播放</span>
                </div>
            </div>

            <div class="player-actions">
                <button class="btn btn-primary" id="playBtn">▶ 立即观看</button>
                <button class="btn btn-secondary" id="refreshBtn">🔄 刷新</button>
            </div>
        </div>

        <div class="channels-panel" id="channelsPanel">
            <div class="panel-header">
                <span>📡 直播频道</span>
                <span class="count" id="channelCount">加载中</span>
            </div>
            <div class="channels-list" id="channelsList">
                <div style="text-align:center;padding:36px 16px;color:var(--text-tertiary);font-size:14px;">加载直播源...</div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast">⚠️ <span id="toastMsg"></span></div>

<script>
(function() {
    const M3U_URL = 'https://live.445569.xyz/live.m3u';

    let channels = [];
    let currentChannel = null;
    let isLoading = false;
    let groupCollapseState = new Map();
    let currentVideoElement = null;
    let isRecovering = false;
    let heartbeatInterval = null;
    let errorRecoveryTimer = null;
    let userHasInteracted = false;
    let pendingUnmute = null;

    const isMobile = () => window.innerWidth < 820;

    const $ = id => document.getElementById(id);
    const container = $('playerContainer');
    const channelsList = $('channelsList');
    const channelCount = $('channelCount');
    const currentLogo = $('currentLogo');
    const currentChannelName = $('currentChannelName');
    const playerBadge = $('playerBadge');
    const playBtn = $('playBtn');
    const refreshBtn = $('refreshBtn');
    const toast = $('toast');
    const toastMsg = $('toastMsg');
    const themeBtn = $('themeToggleBtn');
    const themeIcon = $('themeIcon');
    const themeText = $('themeText');

    function showToast(msg) {
        toastMsg.textContent = msg;
        toast.style.display = 'flex';
        toast.style.animation = 'none';
        toast.offsetHeight;
        toast.style.animation = 'toastUp 0.35s ease-out';
        clearTimeout(toast._hide);
        toast._hide = setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    function getDefaultLogo(name) {
        return '';
    }

    function extractScore(title) {
        const m = title.match(/(\d+)\s*[-:]\s*(\d+)/);
        if (m) return m[1] + ' - ' + m[2];
        return null;
    }

    function parseM3U(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        let cur = null;
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                const info = line.substring(8);
                const idx = info.lastIndexOf(',');
                let title = idx !== -1 ? info.substring(idx + 1) : info;
                title = title.trim() || '未知频道';
                let logo = null, group = null;
                const lm = info.match(/tvg-logo="([^"]*)"/);
                if (lm && lm[1].startsWith('http')) logo = lm[1];
                const gm = info.match(/group-title="([^"]*)"/);
                if (gm) group = gm[1];
                cur = { title, logo, group };
            } else if (line && !line.startsWith('#') && cur) {
                if (line.startsWith('http')) {
                    result.push({
                        title: cur.title,
                        url: line,
                        logo: cur.logo || '',
                        group: cur.group || null,
                        score: extractScore(cur.title)
                    });
                }
                cur = null;
            }
        }
        return result;
    }

    function sortChannels(arr) {
        const a = [], b = [];
        arr.forEach(ch => {
            if (ch.title.includes('纬来') || ch.title.includes('纬來')) b.push(ch);
            else a.push(ch);
        });
        return [...a, ...b];
    }

    function destroyPlayer() {
        if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
        if (errorRecoveryTimer) { clearTimeout(errorRecoveryTimer); errorRecoveryTimer = null; }
        if (currentVideoElement) {
            currentVideoElement.pause();
            currentVideoElement.src = '';
            currentVideoElement.load();
            currentVideoElement.removeAttribute('src');
            if (currentVideoElement.parentNode) currentVideoElement.parentNode.removeChild(currentVideoElement);
            currentVideoElement = null;
        }
        const v = container.querySelector('video');
        if (v) { v.pause(); v.src = ''; v.load(); v.removeAttribute('src'); if (v.parentNode) v.parentNode.removeChild(v); }
        const ifr = container.querySelector('iframe');
        if (ifr) { ifr.src = ''; if (ifr.parentNode) ifr.parentNode.removeChild(ifr); }
        pendingUnmute = null;
        isRecovering = false;
    }

    function showPlaceholder() {
        destroyPlayer();
        container.innerHTML = `
            <div class="player-placeholder">
                <span class="icon">🎥</span>
                <span>点击「立即观看」或频道 ▶</span>
                <span class="hint">内嵌直播直接播放</span>
            </div>
        `;
    }

    function embedPlayer(url) {
        if (!url) { showToast('播放地址无效'); return false; }
        destroyPlayer();
        container.innerHTML = '';

        const u = url.toLowerCase();
        if (u.includes('.m3u8') || u.includes('.mp4') || u.match(/\.(ts|m3u8)(\?|$)/)) {
            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.setAttribute('x5-video-player-type', 'h5');
            video.setAttribute('x5-video-player-fullscreen', 'false');
            video.setAttribute('x5-video-orientation', 'portrait');
            video.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000;border-radius:inherit;';
            video.crossOrigin = 'anonymous';
            video.preload = 'auto';

            if (isMobile()) {
                video.muted = true;
                pendingUnmute = video;
                if (!userHasInteracted) showToast('📱 点击屏幕解锁声音');
            }

            const src = document.createElement('source');
            src.src = url;
            src.type = u.includes('.m3u8') ? 'application/vnd.apple.mpegurl' : 'video/mp4';
            video.appendChild(src);
            container.appendChild(video);
            currentVideoElement = video;

            let errCount = 0;
            const onError = () => {
                errCount++;
                if (errCount <= 2 && !isRecovering) {
                    showToast(`连接异常，重连 (${errCount}/2)...`);
                    if (errorRecoveryTimer) clearTimeout(errorRecoveryTimer);
                    errorRecoveryTimer = setTimeout(() => {
                        if (video.parentNode && currentChannel) silentReload();
                    }, 2000);
                } else if (errCount > 2 && !isRecovering) {
                    showToast('播放异常，自动切换线路');
                    silentReload();
                }
            };
            video.addEventListener('error', onError);

            video.addEventListener('canplay', () => {
                playerBadge.textContent = '';
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                setupHeartbeat(video);
            });

            video.play().catch(() => {
                if (!isMobile()) showToast('请手动点击播放');
            });

            return true;
        } else if (u.includes('youtube.com/embed') || u.includes('player') || u.includes('iframe')) {
            const ifr = document.createElement('iframe');
            ifr.src = url;
            ifr.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
            ifr.allowFullscreen = true;
            ifr.style.cssText = 'width:100%;height:100%;border:none;border-radius:inherit;';
            ifr.loading = 'lazy';
            container.appendChild(ifr);
            return true;
        } else {
            container.innerHTML = `
                <div class="player-placeholder">
                    <span class="icon">⚠️</span>
                    <span>该链接不支持内嵌</span>
                    <span class="hint"><button onclick="window.open('${url}','_blank')" style="background:#fff;border:none;padding:8px 20px;border-radius:9999px;font-weight:600;color:#000;cursor:pointer;margin-top:6px;">新窗口播放</button></span>
                </div>
            `;
            return false;
        }
    }

    function setupHeartbeat(video) {
        let stall = 0, last = 0;
        heartbeatInterval = setInterval(() => {
            if (!video || !video.parentNode) { clearInterval(heartbeatInterval); return; }
            const rs = video.readyState, ns = video.networkState, t = video.currentTime;
            const stuck = (rs < 2 && ns === 2 && !video.ended && !video.paused);
            const frozen = (t === last && rs >= 2 && !video.paused && !video.ended);
            if (stuck || frozen) {
                stall++;
                if (stall >= 3) { stall = 0; silentReload(); }
            } else {
                stall = Math.max(0, stall - 1);
            }
            if (ns === 3 && !isRecovering) silentReload();
            last = t;
        }, 6000);
    }

    function silentReload() {
        if (isRecovering || !currentChannel) return;
        isRecovering = true;
        showToast('网络波动，自动恢复...');
        const url = currentChannel.url;
        destroyPlayer();
        setTimeout(() => {
            embedPlayer(url);
            setTimeout(() => { isRecovering = false; }, 2500);
        }, 500);
    }

    function updateUI(channel) {
        if (channel) {
            if (channel.logo && channel.logo.startsWith('http')) {
                currentLogo.src = channel.logo;
                currentLogo.style.display = 'block';
            } else {
                currentLogo.style.display = 'none';
            }
            currentChannelName.textContent = channel.title;
            playerBadge.textContent = '🎥内嵌 · 就绪';
            playBtn.disabled = false;
        } else {
            currentLogo.style.display = 'none';
            currentChannelName.textContent = '无频道';
            playBtn.disabled = true;
            playerBadge.textContent = '⚠️ 无信号';
        }
    }

    function renderChannels() {
        if (!channels.length) {
            channelsList.innerHTML = `<div style="text-align:center;padding:36px 16px;color:var(--text-tertiary);font-size:14px;">暂无直播源，请刷新</div>`;
            channelCount.textContent = '(0)';
            return;
        }
        channelCount.textContent = `(${channels.length})`;
        const activeId = currentChannel ? currentChannel.url : null;
        const groups = new Map();
        channels.forEach(ch => {
            const g = ch.group && ch.group.trim() ? ch.group : '其他赛事';
            if (!groups.has(g)) groups.set(g, []);
            groups.get(g).push(ch);
        });

        let html = '';
        for (const [gName, gChannels] of groups) {
            const collapsed = groupCollapseState.get(gName) || false;
            const cls = collapsed ? 'collapsed' : '';
            const arrow = collapsed ? '▶' : '▼';
            html += `<div class="category-group">
                <div class="category-header ${cls}" data-group="${gName.replace(/"/g,'&quot;')}">
                    <span>${gName}</span>
                    <span class="arrow">${arrow}</span>
                </div>
                <div class="category-channels ${cls}" style="${collapsed ? 'max-height:0;' : ''}">`;
            for (const ch of gChannels) {
                const idx = channels.indexOf(ch);
                const score = ch.score ? `<span class="item-score">${ch.score}</span>` : '';
                const active = activeId === ch.url ? 'active' : '';
                const logoHtml = ch.logo && ch.logo.startsWith('http') 
                    ? `<img class="item-logo" src="${ch.logo}" onerror="this.style.display='none'">`
                    : `<div class="item-logo" style="display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:14px;font-weight:500;"></div>`;
                html += `
                    <div class="channel-item ${active}" data-index="${idx}">
                        ${logoHtml}
                        <div class="item-info">
                            <div class="item-title">${ch.title} ${score}</div>
                            <div class="item-status"><span class="dot"></span> 内嵌支持</div>
                        </div>
                        <div class="item-play" data-playidx="${idx}">▶</div>
                    </div>
                `;
            }
            html += `</div></div>`;
        }
        channelsList.innerHTML = html;

        document.querySelectorAll('.category-header').forEach(h => {
            h.addEventListener('click', function(e) {
                const g = this.dataset.group;
                const collapsed = groupCollapseState.get(g) || false;
                groupCollapseState.set(g, !collapsed);
                this.classList.toggle('collapsed');
                const next = this.nextElementSibling;
                if (next) {
                    if (!collapsed) { next.style.maxHeight = '0'; next.classList.add('collapsed'); }
                    else { next.style.maxHeight = next.scrollHeight + 'px'; next.classList.remove('collapsed'); }
                }
            });
        });

        document.querySelectorAll('.channel-item').forEach(el => {
            const idx = parseInt(el.dataset.index);
            el.addEventListener('click', function(e) {
                if (e.target.closest('.item-play')) return;
                selectChannel(idx);
            });
            const play = el.querySelector('.item-play');
            if (play) {
                play.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = parseInt(this.dataset.playidx);
                    playChannel(idx);
                });
            }
        });
    }

    function selectChannel(idx) {
        if (channels[idx]) {
            currentChannel = channels[idx];
            updateUI(currentChannel);
            renderChannels();
            showPlaceholder();
        }
    }

    function playChannel(idx) {
        if (channels[idx]) {
            currentChannel = channels[idx];
            updateUI(currentChannel);
            renderChannels();
            embedPlayer(currentChannel.url);
        }
    }

    async function loadChannels() {
        if (isLoading) return;
        isLoading = true;
        refreshBtn.disabled = true;
        channelsList.innerHTML = `<div style="text-align:center;padding:36px 16px;color:var(--text-tertiary);font-size:14px;"><span class="live-badge" style="display:inline-flex;gap:6px;"><span class="dot" style="animation:pulse 1s infinite;"></span> 加载中...</span></div>`;
        try {
            const resp = await fetch(M3U_URL + '?_=' + Date.now(), { cache: 'no-store' });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const text = await resp.text();
            let parsed = parseM3U(text);
            if (!parsed.length) throw new Error('未找到频道');
            parsed = sortChannels(parsed);
            channels = parsed;
            groupCollapseState.clear();
            if (!currentChannel || !channels.find(c => c.url === currentChannel.url)) {
                currentChannel = channels[0] || null;
            }
            updateUI(currentChannel);
            renderChannels();
            showPlaceholder();
            if (currentChannel) {
                setTimeout(() => embedPlayer(currentChannel.url), isMobile() ? 700 : 400);
            }
            showToast('✅ 加载 ' + channels.length + ' 个频道');
        } catch (e) {
            showToast('加载失败: ' + e.message);
            channels = [];
            currentChannel = null;
            updateUI(null);
            renderChannels();
            showPlaceholder();
        }
        isLoading = false;
        refreshBtn.disabled = false;
    }

    function refreshAll() {
        destroyPlayer();
        loadChannels();
    }

    let theme = localStorage.getItem('wc_theme') || 'dark';
    function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        theme = t;
        localStorage.setItem('wc_theme', t);
        if (t === 'light') { themeIcon.textContent = '☀️'; themeText.textContent = '浅色'; }
        else { themeIcon.textContent = '🌙'; themeText.textContent = '深色'; }
    }
    applyTheme(theme);
    themeBtn.addEventListener('click', () => {
        applyTheme(theme === 'dark' ? 'light' : 'dark');
    });

    playBtn.addEventListener('click', () => {
        if (currentChannel) embedPlayer(currentChannel.url);
        else showToast('暂无可用频道');
    });
    refreshBtn.addEventListener('click', refreshAll);

    document.addEventListener('click', () => {
        if (!userHasInteracted) {
            userHasInteracted = true;
            if (pendingUnmute && pendingUnmute.muted) {
                pendingUnmute.muted = false;
                pendingUnmute.play().catch(() => {});
                pendingUnmute = null;
            }
        }
    }, { passive: true });

    document.addEventListener('touchstart', () => {
        if (!userHasInteracted) {
            userHasInteracted = true;
            if (pendingUnmute && pendingUnmute.muted) {
                pendingUnmute.muted = false;
                pendingUnmute.play().catch(() => {});
                pendingUnmute = null;
            }
        }
    }, { passive: true });

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && currentVideoElement && currentChannel && !isRecovering) {
            if (currentVideoElement.readyState < 2 || currentVideoElement.paused) {
                currentVideoElement.play().catch(() => {});
            }
            if (currentVideoElement.networkState === 3) silentReload();
        }
    });

    loadChannels();
    setInterval(() => { if (!isLoading) loadChannels(); }, 8 * 60 * 1000);
})();
</script>
